<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{/*Configurações globais ds CSS*/
            height: 100%
        }
        body {
            background-image: linear-gradient(to right, #4C22A0 1%, #645DC5, #E54D62, #FB8D4E, #FEC750 20%);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1 style="color:white">Testando Gradiente</h1>
</body>
</html>
